# Cloud Run Environment Variables
# Este archivo se usa SOLO para deployment, no contiene secretos
DEFAULT_LIMIT: "10"
TIMEOUT_MINUTES: "15"
LOCK_TIMEOUT_MINUTES: "15"
NODE_ENV: "production"
HEADLESS: "true"
BROWSER_TIMEOUT: "60000"

# Secretos se manejan aparte (API_KEY, ADMIN_TOKEN, FIREBASE_SERVICE_ACCOUNT_PATH)
# Usar: gcloud secrets create o configurar en Cloud Run console
